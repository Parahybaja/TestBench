; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; --- Configuração para Arduino Uno (ativo) ---
[env:uno]
platform = atmelavr
board = uno
framework = arduino
monitor_speed = 115200

; --- Configuração original para ESP32 (comentada) ---
; [env:esp32dev]       ; Nome do ambiente específico do ESP32
; platform = espressif32  ; Plataforma Espressif, usada pelos chips ESP32/ESP8266
; board = esp32dev        ; Board ESP32 DevKit V1

lib_deps =
    marcoschwartz/LiquidCrystal_I2C @ ^1.1.4
    paulstoffregen/TimerOne @ ^1.1.1   ; Timer de hardware de 1 ms para o debounce (substitui timerBegin do ESP32)
    arduino-libraries/SD @ ^1.3.0      ; No ESP32 a SD.h vem embutida no core Espressif; no AVR precisa ser declarada
    bogde/HX711@^0.7.5           ; Biblioteca para a célula de carga HX711, compatível com Arduino Uno
